<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (() => {
        const staleChunkPattern = /Failed to fetch dynamically imported module|Importing a module script failed|error loading dynamically imported module/i;
        function recover(reason) {
          const text = String(reason && (reason.message || reason.reason || reason) || '');
          if (!staleChunkPattern.test(text)) return;
          const key = 'cr-stale-chunk-reloaded';
          if (sessionStorage.getItem(key) === '1') return;
          sessionStorage.setItem(key, '1');
          const url = new URL(location.href);
          url.searchParams.set('_v', String(Date.now()));
          location.replace(url.href);
        }
        window.addEventListener('error', (event) => recover(event.error || event.message));
        window.addEventListener('unhandledrejection', (event) => recover(event.reason));
      })();
    </script>
    %sveltekit.head%
    <title>채린룰</title>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
