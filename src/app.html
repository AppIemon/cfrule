<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
    <title>채린룰</title>
    <style>
      :root {
        --accent: #16a34a !important;
        --accent2: #22c55e !important;
        --accent3: #86efac !important;
        --green-glow: rgba(34, 197, 94, .26);
      }
      body {
        background:
          radial-gradient(circle at 20% 10%, rgba(34,197,94,.14), transparent 28%),
          radial-gradient(circle at 85% 12%, rgba(132,204,22,.10), transparent 26%),
          #f8fff9 !important;
      }
      .brand-gem, .lobby-gem, .sel-gem {
        color: #16a34a !important;
      }
      .accent, .accent-btn, .lobby-cta, .join-btn, .ban-btn.primary, .nav-active {
        background: linear-gradient(135deg, #22c55e, #16a34a) !important;
        border-color: rgba(22, 163, 74, .36) !important;
        box-shadow: 0 10px 28px rgba(34, 197, 94, .24) !important;
      }
      .syl-glow, .my-turn-hero, .player-active, .job-selected {
        box-shadow: 0 0 0 1px rgba(34, 197, 94, .28), 0 18px 45px rgba(34, 197, 94, .16) !important;
      }
      .think-log-panel, .cpu-thinking-row {
        display: none !important;
      }
      .notice-list {
        display: none !important;
      }
      .toast-error, .cr-toast {
        border-color: rgba(34,197,94,.32) !important;
      }
      .cr-tier-burst {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        place-items: center;
        pointer-events: none;
        background: radial-gradient(circle, rgba(34,197,94,.20), transparent 58%);
        animation: crBurstOut 2.2s ease forwards;
      }
      .cr-tier-card {
        padding: 28px 36px;
        border-radius: 28px;
        color: #052e16;
        text-align: center;
        background: linear-gradient(135deg, rgba(236,253,245,.96), rgba(187,247,208,.92));
        border: 1px solid rgba(34,197,94,.35);
        box-shadow: 0 0 90px rgba(34,197,94,.35);
        animation: crTierPop .55s cubic-bezier(.2,1.55,.3,1);
      }
      .cr-tier-card strong {
        display: block;
        color: #15803d;
        font-size: 32px;
        letter-spacing: .04em;
      }
      .cr-tier-card span {
        display: block;
        margin-top: 6px;
        color: #166534;
        font-size: 14px;
      }
      @keyframes crTierPop {
        from { opacity: 0; transform: scale(.72) rotate(-2deg); }
        to { opacity: 1; transform: scale(1) rotate(0); }
      }
      @keyframes crBurstOut {
        0%, 76% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      (() => {
        let lastTierText = '';
        function burst(title, detail) {
          const old = document.querySelector('.cr-tier-burst');
          if (old) old.remove();
          const root = document.createElement('div');
          root.className = 'cr-tier-burst';
          root.innerHTML = '<div class="cr-tier-card"><strong></strong><span></span></div>';
          root.querySelector('strong').textContent = title;
          root.querySelector('span').textContent = detail;
          document.body.appendChild(root);
          setTimeout(() => root.remove(), 2300);
        }
        setInterval(() => {
          const lines = (document.body.innerText || '').split('\n').map((v) => v.trim()).filter(Boolean);
          const result = lines.slice(-18).find((line) => /승리|패배|레이팅|티어|퀘스트 완료|칭호/.test(line));
          if (result && result !== lastTierText) {
            lastTierText = result;
            if (/승리|레이팅|티어/.test(result)) burst('TIER RESULT', result.slice(0, 80));
          }
        }, 1200);
      })();
    </script>
  </body>
</html>
