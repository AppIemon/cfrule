<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
    <title>채린룰</title>
    <style>
      :root { --accent:#16a34a!important; --accent2:#22c55e!important; --accent3:#86efac!important; --green-glow:rgba(34,197,94,.26); }
      body { background: radial-gradient(circle at 20% 10%,rgba(34,197,94,.14),transparent 28%), radial-gradient(circle at 85% 12%,rgba(132,204,22,.10),transparent 26%), #f8fff9!important; }
      .brand-gem,.lobby-gem,.sel-gem{color:#16a34a!important}.accent,.accent-btn,.lobby-cta,.join-btn,.ban-btn.primary,.nav-active{background:linear-gradient(135deg,#22c55e,#16a34a)!important;border-color:rgba(22,163,74,.36)!important;box-shadow:0 10px 28px rgba(34,197,94,.24)!important}.syl-glow,.my-turn-hero,.player-active,.job-selected{box-shadow:0 0 0 1px rgba(34,197,94,.28),0 18px 45px rgba(34,197,94,.16)!important}
      .think-log-panel,.cpu-thinking-row,.notice-list{display:none!important}
      body.cr-battle-hud-on .ingame{visibility:hidden!important}
      .cr-toast-stack{position:fixed;right:18px;top:76px;z-index:99998;display:flex;flex-direction:column;gap:10px;pointer-events:none}.cr-toast{min-width:220px;max-width:380px;padding:12px 14px;border-radius:15px;color:#052e16;background:rgba(240,253,244,.96);border:1px solid rgba(34,197,94,.32);box-shadow:0 14px 45px rgba(22,101,52,.22);font-size:13px;line-height:1.45;animation:crToastIn .2s ease-out;backdrop-filter:blur(10px)}.cr-toast strong{display:block;margin-bottom:3px;color:#15803d;font-size:12px;letter-spacing:.08em}.toast-error{border-color:rgba(34,197,94,.32)!important}
      .cr-hud{position:fixed;inset:62px 12px 12px;z-index:9990;display:grid;grid-template-columns:250px 1fr 250px;grid-template-rows:96px 1fr 138px;gap:12px;color:#052e16;pointer-events:none}.cr-hud-panel{pointer-events:auto;background:rgba(255,255,255,.86);border:1px solid rgba(34,197,94,.20);border-radius:22px;box-shadow:0 18px 55px rgba(22,101,52,.12);backdrop-filter:blur(14px);overflow:hidden}.cr-hud-top{grid-column:1/4;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 18px}.cr-hud-left{grid-column:1;grid-row:2}.cr-hud-center{grid-column:2;grid-row:2}.cr-hud-right{grid-column:3;grid-row:2}.cr-hud-bottom{grid-column:1/4;grid-row:3;display:grid;grid-template-columns:1fr 1.2fr;gap:12px;padding:12px}.cr-kicker{font-size:11px;font-weight:900;color:#16a34a;letter-spacing:.12em;margin-bottom:8px}.cr-syllable{font-size:48px;font-weight:1000;color:#15803d;text-shadow:0 0 24px rgba(34,197,94,.22);line-height:1}.cr-turn{font-weight:900}.cr-player-strip{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}.cr-player-chip{padding:8px 10px;border-radius:14px;background:#f0fdf4;border:1px solid rgba(34,197,94,.20);font-weight:800}.cr-player-chip.on{background:#16a34a;color:white}.cr-panel-body{padding:14px;display:flex;flex-direction:column;gap:10px}.cr-section-title{font-weight:1000;color:#166534;font-size:13px}.cr-pill{display:inline-flex;align-items:center;gap:4px;margin:2px;padding:5px 8px;border-radius:999px;background:#f0fdf4;border:1px solid rgba(34,197,94,.18);font-size:12px;font-weight:800}.cr-pill.bad{background:#fff1f2;border-color:rgba(244,63,94,.20);color:#be123c}.cr-word-list{height:100%;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:9px}.cr-word{align-self:flex-start;padding:9px 12px;border-radius:16px;background:#f0fdf4;border:1px solid rgba(34,197,94,.18);font-size:18px;font-weight:900}.cr-word:nth-child(even){align-self:flex-end;background:#ecfdf5}.cr-cool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}.cr-ability{padding:10px;border:1px solid rgba(34,197,94,.18);border-radius:14px;background:#f7fff9;font-weight:900;cursor:pointer}.cr-ability.needs{box-shadow:inset 0 0 0 1px rgba(22,163,74,.25)}.cr-use-row{display:flex;gap:8px;align-items:center}.cr-use-row input{flex:1;padding:11px 12px;border-radius:14px;border:1px solid rgba(34,197,94,.22);background:white;color:#052e16}.cr-use-row input.hide-target{display:none}.cr-use-row button{padding:11px 14px;border:0;border-radius:14px;background:#16a34a;color:white;font-weight:1000;cursor:pointer}.cr-rank-mini{position:fixed;right:18px;bottom:18px;z-index:9991;width:320px;max-height:45vh;overflow:auto;display:none}.cr-rank-mini.on{display:block}.cr-title-badge{display:inline-flex;margin-left:4px;padding:1px 6px;border-radius:999px;border:1px solid rgba(255,193,7,.34);color:#a16207;background:#fefce8;font-size:10px;white-space:nowrap}.cr-rate{font-size:11px;color:#15803d;font-weight:900}.cr-tier-burst{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;pointer-events:none;background:radial-gradient(circle,rgba(34,197,94,.20),transparent 58%);animation:crBurstOut 2.2s ease forwards}.cr-tier-card{padding:28px 36px;border-radius:28px;color:#052e16;text-align:center;background:linear-gradient(135deg,rgba(236,253,245,.96),rgba(187,247,208,.92));border:1px solid rgba(34,197,94,.35);box-shadow:0 0 90px rgba(34,197,94,.35);animation:crTierPop .55s cubic-bezier(.2,1.55,.3,1)}.cr-tier-card strong{display:block;color:#15803d;font-size:32px;letter-spacing:.04em}.cr-tier-card span{display:block;margin-top:6px;color:#166534;font-size:14px}.cr-practice-guest{position:fixed;left:18px;bottom:18px;z-index:99997;padding:13px 15px;border-radius:16px;background:rgba(240,253,244,.96);border:1px solid rgba(34,197,94,.30);color:#052e16;box-shadow:0 14px 45px rgba(22,101,52,.18);font-size:13px}.cr-practice-guest button{margin-top:8px;padding:8px 12px;border-radius:999px;border:0;background:#16a34a;color:white;font-weight:800;cursor:pointer}
      @keyframes crToastIn{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:none}}@keyframes crTierPop{from{opacity:0;transform:scale(.72) rotate(-2deg)}to{opacity:1;transform:scale(1) rotate(0)}}@keyframes crBurstOut{0%,76%{opacity:1}100%{opacity:0}}
      @media(max-width:900px){.cr-hud{inset:56px 8px 8px;grid-template-columns:1fr;grid-template-rows:auto auto auto auto auto;overflow:auto}.cr-hud-top,.cr-hud-left,.cr-hud-center,.cr-hud-right,.cr-hud-bottom{grid-column:1;grid-row:auto}.cr-hud-bottom{grid-template-columns:1fr}.cr-syllable{font-size:36px}}
    </style>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      (()=>{
        let lastTierText='', lastRankSig=''; const shownToasts=new Set();
        const targetRequired=new Set(['조작','복제','초토화','포획','사구아','2음절','시적 허용','삼키기','브레스','사형 선고','DNA파괴','쪼개기','체크메이트','교환','울음','거짓 보도','거짓 뉴스','찌르기','가르기','수리','핵분열','무량공처','조개','깨부수기','Backspace','Tab']);
        const noTarget=new Set(['주가 조작','환각증','탐지','허들 넘기','직격뢰','시프트','빅 시프트','공허','폭발','A','B','C','쉼표','게살버거','감자튀김','보너스','강도 채용','긴급 구조','결계','왜곡','억제','물걸레질','호박','Shift','Caps Lock']);
        function text(){return document.body.innerText||''} function lines(){return text().split('\n').map(v=>v.trim()).filter(Boolean)}
        function toast(title,detail){const key=title+'|'+detail;if(shownToasts.has(key))return;shownToasts.add(key);let s=document.querySelector('.cr-toast-stack');if(!s){s=document.createElement('div');s.className='cr-toast-stack';document.body.appendChild(s)}const b=document.createElement('div');b.className='cr-toast';b.innerHTML='<strong></strong><span></span>';b.querySelector('strong').textContent=title;b.querySelector('span').textContent=detail;s.appendChild(b);setTimeout(()=>b.remove(),3800);setTimeout(()=>shownToasts.delete(key),10000)}
        function burst(title,detail){const old=document.querySelector('.cr-tier-burst');if(old)old.remove();const r=document.createElement('div');r.className='cr-tier-burst';r.innerHTML='<div class="cr-tier-card"><strong></strong><span></span></div>';r.querySelector('strong').textContent=title;r.querySelector('span').textContent=detail;document.body.appendChild(r);setTimeout(()=>r.remove(),2300)}
        function extract(){const root=document.querySelector('.ingame'); if(!root) return null; const body=text(); const players=[...document.querySelectorAll('.player-card')].map(card=>({name:(card.querySelector('.player-name')?.textContent||'').trim(),job:(card.querySelector('.player-job')?.textContent||'').trim(),active:card.classList.contains('player-active'),effects:[...card.querySelectorAll('.effect-tag')].map(e=>e.textContent.trim())})).filter(p=>p.name); const hist=[...document.querySelectorAll('.word-bubble .bubble-text')].map(e=>e.textContent.trim()).filter(Boolean); return {room:(body.match(/ROOM\s+([A-Z0-9]+)/)||[])[1]||'',turn:(body.match(/TURN\s+(\d+)/)||[])[1]||'',syll:(document.querySelector('.syl-main')?.textContent||'자유').trim(),current:(document.querySelector('.syl-player-name')?.textContent||'—').trim(),players,hist,job:(document.querySelector('.mj-name')?.textContent||'').trim(),effects:[...document.querySelectorAll('.mj-effects .effect-tag,.effect-list .effect-tag')].map(e=>e.textContent.trim()),abilities:[...document.querySelectorAll('.col-control button')].map(b=>b.textContent.trim()).filter(v=>v&&v.length<24&&!/기권|무효|무르기/.test(v))}; }
        function hud(){const d=extract(); let h=document.querySelector('.cr-hud'); if(!d){document.body.classList.remove('cr-battle-hud-on'); if(h)h.remove(); return;} document.body.classList.add('cr-battle-hud-on'); if(!h){h=document.createElement('div');h.className='cr-hud';document.body.appendChild(h)} const needs=[...targetRequired].some(a=>d.abilities.includes(a)); h.innerHTML=`<div class="cr-hud-panel cr-hud-top"><div><div class="cr-kicker">ROOM ${d.room||''}</div><div class="cr-turn">TURN ${d.turn||'1'} · 현재 차례 ${esc(d.current)}</div></div><div><div class="cr-kicker">이을 음절</div><div class="cr-syllable">${esc(d.syll)}</div></div><div class="cr-player-strip">${d.players.map(p=>`<span class="cr-player-chip ${p.active?'on':''}">${esc(p.name)} · ${esc(p.job)}</span>`).join('')}</div></div><div class="cr-hud-panel cr-hud-left"><div class="cr-panel-body"><div class="cr-section-title">능력 / 패시브</div><div>${d.abilities.map(a=>`<button class="cr-ability ${targetRequired.has(a)?'needs':''}" data-ability="${esc(a)}">${esc(a)}</button>`).join('')||'<span class="cr-pill">능력 없음</span>'}</div></div></div><div class="cr-hud-panel cr-hud-center"><div class="cr-word-list">${d.hist.map(w=>`<div class="cr-word">${esc(w)}</div>`).join('')||'<div class="cr-word">첫 단어 대기</div>'}</div></div><div class="cr-hud-panel cr-hud-right"><div class="cr-panel-body"><div class="cr-section-title">버프 / 디버프</div>${d.players.map(p=>`<div><b>${esc(p.name)}</b><div>${(p.effects.length?p.effects:['상태 이상 없음']).map(e=>`<span class="cr-pill ${/불가|금지|봉쇄|최대|최소/.test(e)?'bad':''}">${esc(e)}</span>`).join('')}</div></div>`).join('')}</div></div><div class="cr-hud-panel cr-hud-bottom"><div><div class="cr-kicker">쿨타임 / 사용 횟수</div><div class="cr-cool-grid">${d.abilities.map(a=>`<div class="cr-pill">${esc(a)} · 준비</div>`).join('')||'<div class="cr-pill">표시할 능력 없음</div>'}</div></div><div><div class="cr-kicker">능력 사용</div><div class="cr-use-row"><input class="${needs?'':'hide-target'}" placeholder="능력 대상 / 값 입력"><button type="button">선택한 능력 사용</button></div></div></div>`; h.querySelectorAll('.cr-ability').forEach(btn=>btn.onclick=()=>{const original=[...document.querySelectorAll('.col-control button')].find(b=>b.textContent.trim()===btn.dataset.ability); if(original) original.click(); const input=h.querySelector('.cr-use-row input'); if(targetRequired.has(btn.dataset.ability)){input.classList.remove('hide-target'); input.placeholder=btn.dataset.ability+' 대상 / 값 입력'} else input.classList.add('hide-target');}); h.querySelector('.cr-use-row button').onclick=()=>{const send=[...document.querySelectorAll('.col-control button')].find(b=>/사용|발동|능력/.test(b.textContent||'')); const realInput=[...document.querySelectorAll('.col-control input')].find(i=>/능력|대상|값|입력/.test(i.placeholder||'')||i.value); const input=h.querySelector('.cr-use-row input'); if(realInput&&input&&!input.classList.contains('hide-target')){realInput.value=input.value; realInput.dispatchEvent(new Event('input',{bubbles:true}));} if(send)send.click();}; }
        function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
        async function rank(){if(!/랭킹/.test(text()))return;let data;try{const r=await fetch('/api/ranking',{cache:'no-store'});if(!r.ok)return;data=await r.json()}catch{return}const sig=JSON.stringify(data);if(sig===lastRankSig)return;lastRankSig=sig;let p=document.querySelector('.cr-rank-mini');if(!p){p=document.createElement('div');p.className='cr-rank-mini cr-hud-panel';document.body.appendChild(p)}const jobs=Object.entries(data.jobRanking||{}).slice(0,12);p.innerHTML='<div class="cr-panel-body"><div class="cr-section-title">직업별 티어 랭킹</div>'+jobs.map(([j,rows])=>`<div><b>${esc(j)}</b><br>${(rows||[]).slice(0,3).map((r,i)=>`<span class="cr-pill">#${i+1} ${esc(r.name)} ${r.equippedTitle?`<span class="cr-title-badge">${esc(r.equippedTitle)}</span>`:''} ${r.wins}승</span>`).join('')}</div>`).join('')+'</div>';p.classList.add('on')}
        function practiceGuest(){const body=text(); if(/연습방 알림/.test(body)&&!document.querySelector('.cr-practice-guest')){const box=document.createElement('div');box.className='cr-practice-guest';box.innerHTML='<strong>연습방 입장 알림</strong><br>누군가 방 코드로 들어왔습니다.<br><button type="button">연습 종료</button>';box.querySelector('button').onclick=()=>{document.body.classList.remove('cr-battle-hud-on');box.remove()};document.body.appendChild(box)}}
        setInterval(()=>{for(const line of [...document.querySelectorAll('.notice-item,.notice-list')].map(e=>e.textContent.trim()).filter(Boolean).slice(-3))toast('SYSTEM',line.slice(0,140));const result=lines().slice(-24).find(l=>/승리|패배|레이팅|티어|퀘스트 완료|칭호/.test(l));if(result&&result!==lastTierText){lastTierText=result;if(/승리|레이팅|티어/.test(result))burst('TIER RESULT',result.slice(0,80))}hud();rank();practiceGuest();},700);
      })();
    </script>
  </body>
</html>
