name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: 'Remote API base URL (Vercel deployment)'
        required: false
        default: 'https://cfrule.vercel.app'
      ws_base:
        description: 'WebSocket base URL (or "none" to disable WS)'
        required: false
        default: 'none'
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build SvelteKit (static)
        env:
          BUILD_TARGET: app
          VITE_APP_BUILD: '1'
          VITE_API_BASE: ${{ github.event.inputs.api_base || 'https://cfrule.vercel.app' }}
          VITE_WS_BASE: ${{ github.event.inputs.ws_base || 'none' }}
        run: npm run build:app

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
        shell: bash

      - name: Generate app icon assets
        run: |
          if [ -f "resources/icon.png" ]; then
            npx capacitor-assets generate --android
          else
            echo "::warning::resources/icon.png not found — using default Capacitor icon."
          fi
        shell: bash

      - name: Patch build.gradle for release signing
        run: node scripts/patch-android-signing.mjs

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
        shell: bash

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: charynn-rule-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Cleanup keystore
        if: always()
        run: rm -f android/keystore.jks
        shell: bash
